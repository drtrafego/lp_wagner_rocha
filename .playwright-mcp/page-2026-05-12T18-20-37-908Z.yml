      - generic [ref=e173]:
        - generic [ref=e174]:
          - button "Preciso pagar para a análise inicial? +" [ref=e175] [cursor=pointer]:
            - generic [ref=e176]: Preciso pagar para a análise inicial?
            - generic [ref=e177]: +
          - paragraph [ref=e178]: Não. A análise inicial não tem custo. O Dr. Wagner avalia a situação e orienta sobre o que é possível buscar, sem nenhum compromisso financeiro nesse primeiro momento.
        - generic [ref=e179]:
          - button "Se eu entrar com uma ação, preciso pagar antecipado? +" [ref=e180] [cursor=pointer]:
            - generic [ref=e181]: Se eu entrar com uma ação, preciso pagar antecipado?
            - generic [ref=e182]: +
          - paragraph [ref=e183]: Não. Para trabalhadores que ajuízam ação trabalhista, os honorários são cobrados como percentual sobre o resultado útil bruto do caso, geralmente entre 25% e 35%, conforme análise do caso. Você não desembolsa nada para começar.
        - generic [ref=e184]:
          - button "Preciso ter documentos para a primeira conversa? +" [ref=e185] [cursor=pointer]:
            - generic [ref=e186]: Preciso ter documentos para a primeira conversa?
            - generic [ref=e187]: +
          - paragraph [ref=e188]: Não necessariamente. Você pode descrever o que aconteceu mesmo sem todos os documentos em mãos. Se houver base para atuação, orientamos quais documentos reunir e como obtê-los.
        - generic [ref=e189]:
          - button "Quanto tempo tenho para entrar com uma ação trabalhista? +" [ref=e190] [cursor=pointer]:
            - generic [ref=e191]: Quanto tempo tenho para entrar com uma ação trabalhista?
            - generic [ref=e192]: +
          - paragraph [ref=e193]: Em regra, o prazo é de 2 anos após o fim do contrato de trabalho, com direito a buscar os últimos 5 anos do vínculo. Por isso é importante verificar o quanto antes.
        - generic [ref=e194]:
          - button "E se eu não tiver certeza de que tenho direitos a buscar? +" [ref=e195] [cursor=pointer]:
            - generic [ref=e196]: E se eu não tiver certeza de que tenho direitos a buscar?
            - generic [ref=e197]: +
          - paragraph [ref=e198]: "É exatamente para isso que serve a análise. Você não precisa ter certeza antes de entrar em contato: o trabalho começa justamente por verificar se há ou não irregularidades no seu caso."
        - generic [ref=e199]:
          - button "Quanto tempo demora um processo trabalhista? +" [ref=e200] [cursor=pointer]:
            - generic [ref=e201]: Quanto tempo demora um processo trabalhista?
            - generic [ref=e202]: +
          - paragraph [ref=e203]: Varia conforme a complexidade do caso, a possibilidade de acordo e o andamento na Justiça do Trabalho. Na análise inicial, você recebe uma estimativa realista para a sua situação específica.
        - generic [ref=e204]:
          - button "Consigo ser atendido mesmo estando em outra cidade? +" [ref=e205] [cursor=pointer]:
            - generic [ref=e206]: Consigo ser atendido mesmo estando em outra cidade?
            - generic [ref=e207]: +
          - paragraph [ref=e208]: Sim. O atendimento pode ser feito de forma virtual, análise de documentos e reuniões online, para quem está em qualquer cidade do Brasil.
